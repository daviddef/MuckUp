name: MuckUp
options:
  bundleIdPrefix: com.muckup
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.muckup.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MuckUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MuckUp
    resources:
      - path: MuckUp/Resources
    info:
      path: MuckUp/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: MuckBg
        NSLocationWhenInUseUsageDescription: "Muck Up uses your location to show nearby mucks and events."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Muck Up uses your location to show nearby mucks and events."
        NSCameraUsageDescription: "Muck Up needs your camera to photograph mucks you report."
        NSPhotoLibraryUsageDescription: "Muck Up needs photo library access to attach images to mucks."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        CFBundleDisplayName: Muck Up
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        INFOPLIST_FILE: MuckUp/Info.plist
