name: Grub
options:
  bundleIdPrefix: com.daviddef
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "L9SAXP2E2W"
    PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.grub
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "202607091320"

targets:
  Grub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MuckUp
    resources:
      - path: MuckUp/Resources
    info:
      path: MuckUp/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        NSLocationWhenInUseUsageDescription: "Grub uses your location to show nearby mucks and events."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Grub uses your location to show nearby mucks and events."
        NSCameraUsageDescription: "Grub needs your camera to photograph mucks you report."
        NSPhotoLibraryUsageDescription: "Grub needs photo library access to attach images to mucks."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        CFBundleDisplayName: Grub
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIDeviceFamily:
          - 1
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.lifestyle
    settings:
      base:
        INFOPLIST_FILE: MuckUp/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: MuckUp/Grub.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.developer.icloud-container-identifiers: [iCloud.com.daviddef.grub]
        com.apple.developer.icloud-services: [CloudKit]
